server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy: n8n API (umgeht CORS)
    location /proxy/n8n/ {
        proxy_pass https://n8n.f3-events.de/;
        proxy_set_header Host n8n.f3-events.de;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-N8N-API-KEY $http_x_n8n_api_key;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Proxy: Cookie-Crawler /metrics (internes Docker-Netz)
    location /proxy/metrics {
        proxy_pass http://f3-cookie-crawler:3000/metrics;
    }

    # Proxy: Auto-Post Status (n8n schreibt, Dashboard liest)
    location /proxy/autopost-status {
        proxy_pass http://f3-cookie-crawler:3000/status/autopost;
    }

    # Proxy: Events Status (Teilnehmer-Sync schreibt, Dashboard liest)
    location /proxy/events-status {
        proxy_pass http://f3-cookie-crawler:3000/status/events;
    }

    # Proxy: NocoDB API (umgeht CORS)
    location /proxy/nocodb/ {
        proxy_pass https://nocodb.f3-events.de/;
        proxy_set_header Host nocodb.f3-events.de;
        proxy_set_header xc-auth $http_xc_auth;
        proxy_set_header xc-token $http_xc_token;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Sicherheits-Header
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer;

    # Kein Caching für HTML (damit config.js-Änderungen sofort wirken)
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Statische Assets cachen
    location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public";
    }
}
