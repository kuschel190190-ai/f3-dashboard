server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # index.html nie cachen – immer frisch vom Server
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Proxy: n8n API (umgeht CORS)
    location /proxy/n8n/ {
        proxy_pass https://n8n.f3-events.de/;
        proxy_set_header Host n8n.f3-events.de;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-N8N-API-KEY $http_x_n8n_api_key;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Proxy: Cookie-Crawler via host.docker.internal
    # --add-host=host.docker.internal:host-gateway in Custom Docker Options gesetzt
    location /proxy/metrics {
        proxy_pass http://host.docker.internal:3000/metrics;
    }

    location /proxy/autopost-status {
        proxy_pass http://host.docker.internal:3000/status/autopost;
    }

    location /proxy/events-status {
        proxy_pass http://host.docker.internal:3000/status/events;
    }

    location /proxy/debug {
        proxy_pass http://host.docker.internal:3000/debug;
    }

    location /proxy/login {
        proxy_pass http://host.docker.internal:3000/login;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /proxy/cookies {
        proxy_pass http://host.docker.internal:3000/cookies;
        proxy_read_timeout 30s;
    }

    location /proxy/status-write {
        proxy_pass http://host.docker.internal:3000/status;
        proxy_set_header Content-Type $http_content_type;
    }

    location /proxy/cookie-status {
        proxy_pass http://host.docker.internal:3000/status/cookies;
    }

    # Proxy: Master API (zentraler Einstiegspunkt für alle Actions)
    location /proxy/master-api {
        proxy_pass https://n8n.f3-events.de/webhook/f3-master-api;
        proxy_set_header Host n8n.f3-events.de;
        proxy_set_header Content-Type $http_content_type;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_read_timeout 120s;
    }

    # Proxy: NocoDB API (umgeht CORS)
    location /proxy/nocodb/ {
        proxy_pass https://nocodb.f3-events.de/;
        proxy_set_header Host nocodb.f3-events.de;
        proxy_set_header xc-auth $http_xc_auth;
        proxy_set_header xc-token $http_xc_token;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Sicherheits-Header
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer;

    # HTML: nie cachen
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # JS/CSS: ETag-basierte Revalidierung (kein Cache, aber 304 wenn unverändert)
    # → Browser lädt nur neu wenn sich die Datei wirklich geändert hat
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        etag on;
        expires 0;
    }

    # Bilder/Fonts: 7 Tage (ändern sich selten)
    location ~* \.(png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
