server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Basic Auth – schützt das gesamte Dashboard
    auth_basic           "F3 Dashboard";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy: n8n API (umgeht CORS)
    location /proxy/n8n/ {
        auth_basic off;
        proxy_pass https://n8n.f3-events.de/;
        proxy_set_header Host n8n.f3-events.de;
        proxy_set_header Authorization $http_authorization;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Proxy: NocoDB API (umgeht CORS)
    location /proxy/nocodb/ {
        auth_basic off;
        proxy_pass https://nocodb.f3-events.de/;
        proxy_set_header Host nocodb.f3-events.de;
        proxy_set_header xc-auth $http_xc_auth;
        proxy_set_header xc-token $http_xc_token;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Sicherheits-Header
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer;

    # Kein Caching für HTML (damit config.js-Änderungen sofort wirken)
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Statische Assets cachen
    location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public";
    }
}
